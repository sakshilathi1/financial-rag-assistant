data:
  edgar_base_url: "https://data.sec.gov"
  user_agent: "Financial RAG Assistant contact@example.com"
  chunk_size: 512
  chunk_overlap: 64
  min_chunk_length: 100

retrieval:
  dense:
    model_name: "BAAI/bge-small-en-v1.5"
    top_k: 10
    batch_size: 32
  sparse:
    top_k: 10
    b: 0.75
    k1: 1.5
  hybrid:
    top_k: 10
    dense_weight: 0.5
    sparse_weight: 0.5
    rrf_k: 60

generation:
  model: "gpt-3.5-turbo"
  max_tokens: 512
  temperature: 0.0
  top_k_context: 5

evaluation:
  k_values: [1, 3, 5, 10]
  metrics:
    - recall
    - precision
    - mrr
    - ndcg
    - rouge_l
